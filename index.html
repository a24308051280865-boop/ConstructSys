<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>ConstructSys - Login</title>
		
		<!-- Preconectar con Google Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
		
		<link rel="stylesheet" href="src/styles/index.css">
		<link rel="icon" href="src/assets/icons/constructsys.ico">
	</head>
	<body>

		<!-- Fondos decorativos -->
		<div class="bg-grid"></div>
		<div class="bg-glow"></div>

		<!-- Botón Crear Cuenta -->
		<a href="src/views/register.html" class="btn-register">
			<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
				<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
				<circle cx="9" cy="7" r="4"/>
				<line x1="19" y1="8" x2="19" y2="14"/>
				<line x1="22" y1="11" x2="16" y2="11"/>
			</svg>
			Crear Cuenta
		</a>

		<!-- Toasts (Notificador) -->
		<div id="toast-container"></div>

		<!-- Toggle de Idioma -->
		<button class="lang-toggle" id="lang-toggle" aria-label="Cambiar idioma">
			<div class="lang-switch"></div>
			<span class="lang-label" id="lang-label">ES</span>
		</button>

		<!-- Contenedor del Login -->
		<div class="login-wrap">

			<!-- Logo -->
			<div class="login-logo">
				<div class="logo-hex">
					<span>CS</span>
				</div>
				<div class="logo-company">
					ConstructSys
				</div>
				<div class="logo-sub">
					Sistema de Gestión de Obras
				</div>
			</div>

			<!-- Carta del Login -->
			<div class="login-card">

				<!-- Encabezado de la Carta -->
				<div class="card-header-login">
					<h1>Iniciar Sesión</h1>
					<p>Ingresa tus credenciales para acceder al sistema</p>
				</div>

				<!-- Cuerpo de la Carta -->
				<div class="card-body-login">

					<!-- Banner de Error -->
					<div class="error-banner" id="error-banner">
						
						<!-- Stroke es el contorno y la  ViewBox: min-x, min-y, width, height -->
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">   
							<circle cx="12" cy="12" r="10"/>
							<line x1="12" y1="8" x2="12" y2="12"/>
							<line x1="12" y1="16" x2="12.01" y2="16"/>
						</svg>
						
						<span id="error-msg">Credenciales incorrectas.</span>
					</div>

					<!-- Campo de Email-->
					<div class="field">
						<label for="email">Correo Electrónico</label>
						<div class="input-wrap">
							<svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">							
								<rect x="2" y="4" width="20" height="16" rx="2"/>
								<polyline points="2,4 12,13 22,4"/>
							</svg>
							<input type="email" id="email" placeholder="usuario@empresa.com" autocomplete="off">
						</div>
					</div>

					<!-- Campo de Contraseña -->
					<div class="field">
						
						<!-- Encabezado del Campo de Contraseña -->
						<label for="password">Contraseña</label>
						
						<!-- Contenedor del Campo de Contraseña -->
						<div class="input-wrap">
							<svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
								<rect x="3" y="11" width="18" height="11" rx="2"/>
								
								<!-- M=Move To, V=Vertical Line, v=Vertical Line (relative), a=Arc (Relative), c=Cubic Bezier Curve (relative) -->
								<path d="M7 11V7a5 5 0 0 1 10 0v4"/>
							
							</svg>
							<input type="password" id="password" placeholder="••••••••" autocomplete="off">
							<button type="button" class="toggle-pw" id="toggle-pw" aria-label="Mostrar contraseña">
								
								<!-- Icono del Ojo Cerrado -->
								<svg id="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
									<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
									<path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
									<line x1="1" y1="1" x2="23" y2="23"/>
								</svg>
								
								<!-- Icono del Ojo Abierto -->
								<svg id="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none">
									<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
									<circle cx="12" cy="12" r="3"/>
								</svg>

							</button>
						</div>
					</div>

					<!-- Olvidaste tu contraseña -->
					<div class="field-meta">
						<a href="#" class="link-subtle">¿Olvidaste tu contraseña?</a>
					</div>

					<!-- Botón de Envío -->
					<button class="btn-submit" id="btn-login">
						<span class="btn-text">Acceder al Sistema</span>
						<div class="spinner"></div>
					</button>
					
					<!-- Separador -->
					<div class="divider-oauth"></div>

					<!-- Google OAuth -->
					<a href="api/auth/google/redirect.php" class="btn-google">
						<svg width="18" height="18" viewBox="0 0 48 48">
							<path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
							<path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
							<path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
							<path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
						</svg>
						Continuar con Google
					</a>

				</div>
			</div>
		</div>

		<!-- Scripts -->
		<script src="src/scripts/index.js"></script>
	
	</body>
</html>

<!-------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------->
