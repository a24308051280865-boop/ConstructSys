<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>ConstructSys — Create Account</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
		<link rel="stylesheet" href="../styles/register.css" />
		<link rel="icon" href="../assets/icons/constructsys.ico">
	</head>
	<body>

		<!-- Elementos de Background -->
		<div class="bg-grid"></div>
		<div class="bg-glow"></div>
		<div class="bg-accent"></div>

		<!-- Toggle de idioma -->
		<div class="lang-toggle" id="langToggle">
			<div class="lang-switch"></div>
			<span class="lang-label" id="langLabel">EN</span>
		</div>

		<!-- Toast container -->
		<div id="toast-container"></div>

		<!-- Contenedor de registro -->
		<div class="register-wrap">

			<!-- Logo -->
			<div class="register-logo">
				<div class="logo-hex"><span>CS</span></div>
				<div class="logo-company">ConstructSys</div>
				<div class="logo-sub" data-i18n="tagline">Sistema de Gestión de Obra</div>
			</div>

			<!-- Tarjeta de registro -->
			<div class="register-card">

				<!-- Header -->
				<div class="card-header">

					<!-- Encabezado -->
					<div class="header-text">
						<h1 data-i18n="heading">Crear Cuenta</h1>
						<p data-i18n="subheading">Registra tu empresa y accede de inmediato</p>
					</div>

					<!-- Indicador de pasos -->
					<div class="step-badge">
						<div class="step-dot active" id="dot1"></div>
						<div class="step-dot" id="dot2"></div>
						<div class="step-dot" id="dot3"></div>
					</div>

				</div>

				<!-- Body -->
				<div class="card-body">

					<!-- Banner de error -->
					<div class="error-banner" id="errorBanner">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<circle cx="12" cy="12" r="10"/>
							<line x1="12" y1="8"  x2="12"    y2="12"/>
							<line x1="12" y1="16" x2="12.01" y2="16"/>
						</svg>
						<span id="errorMsg"></span>
					</div>

					<!-- Formulario de registro -->
					<form id="registerForm" novalidate>

						<!-- Sección: Empresa -->
						<div class="section-sep">
							<span data-i18n="sec_company">Empresa</span>
						</div>

						<!-- Campo: Nombre de la empresa -->
						<div class="field">
							
							<!--Encabezado del Campo -->
							<label for="company">
								<span data-i18n="lbl_company">Nombre de la empresa</span> 
								<span class="required">*</span>
							</label>
							
							<!-- Input con ícono -->
							<div class="input-wrap">
								
								<!-- Ícono del campo -->
								<svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
									<rect x="2" y="7" width="20" height="15" rx="1"/>
									<path d="M16 22V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v4"/>
									<line x1="9" y1="22" x2="9"  y2="12"/>
									<line x1="15" y1="22" x2="15" y2="12"/>
									<line x1="9" y1="12" x2="15"  y2="12"/>
								</svg>
							
								<!-- Input del campo -->
								<input type="text" id="company" name="company" data-ph-es="Constructora Alpha S.A. de C.V." data-ph-en="Alpha Construction Corp." placeholder="Constructora Alpha S.A. de C.V." autocomplete="organization" />
							
							</div>
						</div>

						<!-- Sección: Administrador -->
						<div class="section-sep">
							<span data-i18n="sec_admin">Administrador</span>
						</div>

						<!-- Campos de nombre y apellido -->
						<div class="field-row">
							
							<!-- Campo: Nombre -->
							<div class="field">
								
								<!-- Encabezado del Campo -->
								<label for="firstName">
									<span data-i18n="lbl_name">Nombre</span> 
									<span class="required">*</span>
								</label>
								
								<!-- Input con ícono -->
								<div class="input-wrap">
									
									<!-- Ícono del campo -->
									<svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
										<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
										<circle cx="12" cy="7" r="4"/>
									</svg>
									
									<!-- Input del campo -->
									<input type="text" id="firstName" name="firstName" data-ph-es="Carlos" data-ph-en="John" placeholder="Carlos" autocomplete="given-name" />
								
								</div>

							</div>

							<!-- Campo: Apellido -->
							<div class="field">
								
								<!-- Encabezado del Campo -->
								<label for="lastName">
									<span data-i18n="lbl_surname">Apellido</span> 
									<span class="required">*</span>
								</label>
								
								<!-- Input con ícono -->
								<div class="input-wrap">
									
									<!-- Ícono del campo -->
									<svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
										<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
										<circle cx="12" cy="7" r="4"/>
									</svg>

									<!-- Input del campo -->
									<input type="text" id="lastName" name="lastName" data-ph-es="Magallanes" data-ph-en="Smith" placeholder="Magallanes" autocomplete="family-name" />
								
								</div>
							
							</div>
						</div>

						<!-- Sección: Acceso -->
						<div class="section-sep">
							<span data-i18n="sec_access">Acceso</span>
						</div>

						<!-- Campo: Correo electrónico -->
						<div class="field">
							
							<!-- Encabezado del Campo -->
							<label for="email">
								<span data-i18n="lbl_email">Correo electrónico</span> 
								<span class="required">*</span>
							</label>
							
							<!-- Ícono del campo -->
							<div class="input-wrap">
								
								<!-- Ícono del campo -->
								<svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
									<rect x="2" y="4" width="20" height="16" rx="2"/>
									<polyline points="2,4 12,13 22,4"/>
								</svg>

								<!-- Input del campo -->
								<input type="email" id="email" name="email" data-ph-es="carlos@constructora.com" data-ph-en="john@company.com" placeholder="carlos@constructora.com" autocomplete="email" />
							
							</div>

						</div>

						<!-- Campo: Contraseña -->
						<div class="field" style="margin-bottom: 6px;">
							
							<!-- Encabezado del Campo -->
							<label for="password">
								<span data-i18n="lbl_password">Contraseña</span> 
								<span class="required">*</span>
							</label>

							<!-- Input del campo -->
							<div class="input-wrap">
								
								<!-- Ícono del campo -->
								<svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
									<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
									<path d="M7 11V7a5 5 0 0 1 10 0v4"/>
								</svg>

								<!-- Input del campo -->
								<input type="password" id="password" name="password" data-ph-es="Mín. 8 caracteres" data-ph-en="Min. 8 characters" placeholder="Mín. 8 caracteres" autocomplete="new-password" class="has-toggle" />
								
								<!-- Botón para mostrar/ocultar contraseña -->
								<button type="button" class="toggle-pw" id="togglePw" aria-label="Mostrar contraseña">
									<svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
										<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
										<circle cx="12" cy="12" r="3"/>
									</svg>
								</button>

							</div>

							<!-- Indicador de fortaleza -->
							<div class="pw-strength" id="pwStrength">
								
								<!-- Barras de fortaleza -->
								<div class="strength-bars">
									<div class="strength-bar" id="bar1"></div>
									<div class="strength-bar" id="bar2"></div>
									<div class="strength-bar" id="bar3"></div>
									<div class="strength-bar" id="bar4"></div>
								</div>
								
								<!-- Etiqueta de fortaleza -->
								<span class="strength-label" id="strengthLabel">—</span>
							
							</div>
						
						</div>

						<!-- Banner de error específico para el campo de contraseña -->
						<button type="submit" class="btn-submit" id="submitBtn">
							
							<!-- Texto del botón -->
							<span class="btn-text">
								
								<!-- Ícono del botón -->
								<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="vertical-align:-2px; margin-right:4px;">
									<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
									<circle cx="9" cy="7" r="4"/>
									<line x1="19" y1="8" x2="19" y2="14"/>
									<line x1="22" y1="11" x2="16" y2="11"/>
								</svg>
								
								<!-- Texto del botón -->
								<span data-i18n="btn_submit">Crear Cuenta</span>
							
							</span>
							
							<div class="spinner"></div>
						</button>

					</form>
				</div>

				<!-- Footer -->
				<div class="card-footer-login">
					
					<!-- Footer Left -->
					<div class="footer-left">
						<span data-i18n="footer_login_prompt">¿Ya tienes cuenta?</span>
						<a href="../views/login.html" class="link-subtle" style="margin-left:5px;" data-i18n="footer_login_link">Inicia sesión</a>
					</div>
					
					<!-- Footer Right -->
					<div class="footer-right">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<rect x="3" y="11" width="18" height="11" rx="2"/>
							<path d="M7 11V7a5 5 0 0 1 10 0v4"/>
						</svg>
						<span data-i18n="footer_secure">Conexión segura</span>
					</div>
				
				</div>

			</div>
		</div>

		<!-- Scripts -->
		<script src="../scripts/register.js"></script>

	</body>
</html>

<!-------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------->
