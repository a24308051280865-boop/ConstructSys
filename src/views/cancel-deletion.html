<!DOCTYPE html>
<html lang="es" id="html">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>ConstructSys — Cancel Deletion</title>
 
		<!-- Preconectar con Google Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

		<!-- Estilos -->
		<link rel="stylesheet" href="../styles/forgot-password.css">
		<link rel="icon" href="../assets/icons/constructsys.ico">
	</head>
	<body>

		<!-- Fondos decorativos -->
		<div class="bg-grid"></div>
		<div class="bg-glow"></div>

		<!-- Toasts -->
		<div id="toast-container"></div>

		<!-- Toggle de Idioma -->
		<button class="lang-toggle" id="lang-toggle" aria-label="Cambiar idioma">
			<div class="lang-switch"></div>
			<span class="lang-label" id="lang-label">ES</span>
		</button>

		<!-- Contenedor -->
		<div class="login-wrap">

			<!-- Logo -->
			<div class="login-logo">
				<div class="logo-hex">
					<span>CS</span>
				</div>
				<div class="logo-company">ConstructSys</div>
				<div class="logo-sub" id="logo-sub">Sistema de Gestión de Obras</div>
			</div>

			<!-- Carta -->
			<div class="login-card">

				<!-- Encabezado -->
				<div class="card-header-login">
					<h1 id="card-title">Procesando...</h1>
					<p id="card-sub"></p>
				</div>

				<!-- Cuerpo -->
				<div class="card-body-login">

					<!-- Banner de Error -->
					<div class="error-banner" id="error-banner">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<circle cx="12" cy="12" r="10"/>
							<line x1="12" y1="8" x2="12" y2="12"/>
							<line x1="12" y1="16" x2="12.01" y2="16"/>
						</svg>
						<span id="error-msg"></span>
					</div>

					<!-- Banner de Éxito -->
					<div class="success-banner" id="success-banner">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
							<polyline points="22 4 12 14.01 9 11.01"/>
						</svg>
						<div class="success-banner-text">
							<p id="success-title"></p>
							<p id="success-msg"></p>
						</div>
					</div>

				</div>

				<!-- Pie -->
				<div class="card-footer-login">
					<a href="../views/login.html" class="back-link">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<line x1="19" y1="12" x2="5" y2="12"/>
							<polyline points="12 19 5 12 12 5"/>
						</svg>
						<span id="back-label">Volver a iniciar sesión</span>
					</a>
				</div>

			</div>
		</div>

		<!-- Scripts -->
		<script src="../scripts/cancel_deletion.js"></script>

	</body>
</html>
