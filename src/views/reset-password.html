<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ConstructSys — New Password</title>

        <!-- Preconectar con Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">

        <!-- Estilos -->
        <link rel="stylesheet" href="../styles/forgot-password.css">
    </head>
    <body>

        <!-- Fondo con cuadrícula -->
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <!-- Toasts (Notificador) -->
        <div id="toast-container"></div>

        <!-- Toggle de Idioma -->
        <button class="lang-toggle" id="lang-toggle" aria-label="Cambiar idioma">
            <div class="lang-switch"></div>
            <span class="lang-label" id="lang-label">ES</span>
        </button>

        <!-- Contenedor principal -->
        <div class="login-wrap">

            <!-- Logo -->
            <div class="login-logo">
                <div class="logo-hex"><span>CS</span></div>
                <div class="logo-company">ConstructSys</div>
				<div class="logo-sub" id="logo-sub">Sistema de Gestión de Obras</div>            
            </div>

            <!-- Carta del Reset Password -->
            <div class="login-card">

                <!-- Encabezado de la Carta -->
                <div class="card-header-login">
                    <h1 id="card-title">Nueva Contraseña</h1>
                    <p id="card-sub">Crea una nueva contraseña segura para tu cuenta</p>
                </div>

                <!-- Cuerpo de la Carta -->
                <div class="card-body-login">

                    <!-- Banner de Error -->
                    <div class="error-banner" id="error-banner">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        <span id="error-msg">Error</span>
                    </div>

                    <!-- Banner de Éxito -->
                    <div class="success-banner" id="success-banner">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                        <div class="success-banner-text">
                            <p id="success-title">Contraseña actualizada</p>
                            <p id="success-msg">Redirigiendo al inicio de sesión...</p>
                        </div>
                    </div>

                    <!-- Sección del Formulario -->
                    <div id="form-section">

                        <!-- Campo de Contraseña -->
                        <div class="field">
                            <label for="password">Nueva Contraseña</label>
                            <div class="input-wrap">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                    <rect x="3" y="11" width="18" height="11" rx="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                                <input type="password" id="password" placeholder="Mínimo 8 caracteres">
                            </div>
                        </div>

                        <!-- Campo de Confirmación de Contraseña -->
                        <div class="field">
                            <label for="confirm">Confirmar Contraseña</label>
                            <div class="input-wrap">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                    <rect x="3" y="11" width="18" height="11" rx="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                                <input type="password" id="confirm" placeholder="Repite la contraseña">
                            </div>
                        </div>

                        <!-- Botón de Envío -->
                        <button class="btn-submit" id="btn-submit">
                            <span class="btn-text">Guardar Nueva Contraseña</span>
                            <div class="spinner"></div>
                        </button>

                    </div>

                </div>

                <!-- Pie de la Carta -->
                <div class="card-footer-login">
                    <a href="../index.html" class="back-link">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="19" y1="12" x2="5" y2="12"/>
                            <polyline points="12 19 5 12 12 5"/>
                        </svg>
                        <span>Volver a iniciar sesión</span>
                    </a>
                </div>

            </div>
        </div>

        <!-- Scripts -->
        <script src="../scripts/reset_password.js"></script>

    </body>
</html>
